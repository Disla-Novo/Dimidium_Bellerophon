name: CLA Enforcement

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  verify-cla:
    name: Verify Legal Checklist
    # if: github.event.pull_request.head.repo.fork == true
    runs-on: ubuntu-latest

    steps:
      - name: Check PR Body for Checked Boxes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Convert PR body to lowercase for case-insensitive matching
          BODY_LOWER=$(echo "$PR_BODY" | tr '[:upper:]' '[:lower:]')
          FAIL=0

          # Check 1: CLA Agreement
          if ! echo "$BODY_LOWER" | grep -qE -- "- \[x\].*agree.*(cla|contributor license agreement)"; then
            echo "::error::Missing CLA Agreement. You must check the box confirming you agree to the CLA."
            FAIL=1
          fi

          # Check 2: Original Work Confirmation (flexible phrasing)
          if ! echo "$BODY_LOWER" | grep -qE -- "- \[x\].*(original work|my own work|my work)"; then
            echo "::error::Missing Original Work confirmation. You must check the box confirming this is your own original work."
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi

          echo "All legal and CLA checkboxes are marked. Code is cleared for review."